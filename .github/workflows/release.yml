name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify version match
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MODULE_VERSION=$(grep '"version"' src/module.json | head -1 | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
          if [ "$TAG_VERSION" != "$MODULE_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match module.json version ($MODULE_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker
        run: |
          docker build -t aphex-builder -f scripts/Dockerfile .
          docker run --rm -v "$PWD:/build" aphex-builder bash -c "
            dos2unix /build/src/dsp/*.c /build/src/dsp/*.h /build/src/dsp/host/*.h 2>/dev/null || true
            mkdir -p /build/dist/aphex
            aarch64-linux-gnu-gcc \
              -O2 -shared -fPIC -ffast-math \
              -Wall -Wno-unused -Wno-format \
              -I /build/src/dsp \
              -o /build/dist/aphex/dsp.so \
              /build/src/dsp/aphex.c \
              -lm
            cp /build/src/module.json /build/dist/aphex/
            tar -C /build/dist -czf /build/dist/aphex-module.tar.gz aphex/
          "

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aphex-module.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit release.json
        run: |
          # Tag-triggered runs are in detached HEAD; checkout the default
          # branch BEFORE writing release.json or the next checkout will
          # overwrite the file we just produced.
          VERSION="${GITHUB_REF_NAME#v}"
          BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
          git fetch origin "$BRANCH"
          git checkout -f "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cat > release.json <<EOF
          {
            "version": "${VERSION}",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/aphex-module.tar.gz"
          }
          EOF
          git add release.json
          git commit -m "ci: update release.json for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin "$BRANCH"
